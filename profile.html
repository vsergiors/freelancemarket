<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perfil — FreelanceMarket</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c6af7;
      --accent2: #f7c26a;
      --text: #f0eeff;
      --muted: #7a7a9a;
      --success: #4ade80;
      --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 64px;
      background: rgba(10,10,15,0.9); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .5rem 1.2rem; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: .875rem; font-weight: 500; cursor: pointer; border: none; transition: all .2s; text-decoration: none; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6a58e5; transform: translateY(-1px); }
    .btn-sm { padding: .4rem 1rem; font-size: .8rem; border-radius: 7px; }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }

    /* COVER + AVATAR */
    .profile-cover {
      height: 220px; position: relative; overflow: hidden;
      background: linear-gradient(135deg, #1a1230 0%, #0d1a2e 50%, #130d2e 100%);
    }
    .cover-pattern {
      position: absolute; inset: 0; opacity: .3;
      background-image: radial-gradient(circle at 20% 50%, rgba(124,106,247,.4) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(247,194,106,.3) 0%, transparent 50%);
    }
    .profile-avatar-wrap {
      position: absolute; bottom: -50px; left: 2rem;
    }
    .profile-avatar {
      width: 100px; height: 100px; border-radius: 50%;
      border: 4px solid var(--bg);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; color: #fff;
      overflow: hidden;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .online-dot {
      position: absolute; bottom: 6px; right: 6px;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--success); border: 3px solid var(--bg);
    }

    /* PROFILE HEADER */
    .profile-header {
      padding: 4rem 0 2rem;
      display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem;
    }
    .profile-info {}
    .profile-name { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; margin-bottom: .2rem; }
    .profile-username { color: var(--muted); font-size: .9rem; margin-bottom: .6rem; }
    .profile-bio { color: #c8c8e0; font-size: .95rem; max-width: 600px; line-height: 1.6; margin-bottom: 1rem; }
    .profile-meta { display: flex; gap: 1.25rem; flex-wrap: wrap; }
    .profile-meta span { display: flex; align-items: center; gap: .35rem; font-size: .85rem; color: var(--muted); }
    .profile-actions { display: flex; gap: .75rem; }

    /* STATS BAR */
    .stats-bar {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: var(--border);
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; margin-bottom: 2.5rem;
    }
    .stat-cell {
      background: var(--surface); padding: 1.25rem;
      text-align: center;
    }
    .stat-val { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; color: var(--text); }
    .stat-label { font-size: .78rem; color: var(--muted); margin-top: .2rem; text-transform: uppercase; letter-spacing: .05em; }
    @media(max-width:600px) { .stats-bar { grid-template-columns: repeat(2,1fr); } }

    /* LAYOUT */
    .profile-layout { display: grid; grid-template-columns: 1fr 300px; gap: 2rem; padding-bottom: 4rem; }
    @media(max-width:860px) { .profile-layout { grid-template-columns: 1fr; } }

    /* SECTION */
    .section { margin-bottom: 2.5rem; }
    .section-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 1.25rem; padding-bottom: .75rem; border-bottom: 1px solid var(--border); }

    /* SERVICES GRID */
    .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }
    .service-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; text-decoration: none; transition: all .25s; display: block;
    }
    .service-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 12px 32px rgba(124,106,247,.15); }
    .sc-cover {
      height: 100px; background: var(--surface2);
      display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
    }
    .sc-body { padding: 1rem; }
    .sc-title { font-family: 'Syne', sans-serif; font-size: .9rem; font-weight: 700; margin-bottom: .35rem; color: var(--text); line-height: 1.3; }
    .sc-footer { display: flex; justify-content: space-between; align-items: center; margin-top: .75rem; }
    .sc-rating { font-size: .8rem; color: var(--accent2); }
    .sc-price { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .95rem; color: var(--accent2); }

    /* REVIEWS */
    .review-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
    .review-header { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
    .review-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #f7c26a, #f87171); display: flex; align-items: center; justify-content: center; font-size: .8rem; font-weight: 700; color: #fff; flex-shrink: 0; }
    .review-name { font-size: .9rem; font-weight: 600; }
    .review-date { font-size: .75rem; color: var(--muted); }
    .review-stars { color: var(--accent2); font-size: .85rem; margin-bottom: .4rem; }
    .review-text { color: #b8b8d0; font-size: .875rem; line-height: 1.6; }
    .review-service { font-size: .78rem; color: var(--accent); margin-top: .4rem; }

    /* SIDEBAR */
    .sidebar-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.25rem; }
    .sidebar-card-title { font-family: 'Syne', sans-serif; font-size: .8rem; font-weight: 700; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 1rem; }
    .skill-chip { display: inline-flex; padding: .3rem .75rem; background: rgba(124,106,247,.12); border: 1px solid rgba(124,106,247,.25); color: var(--accent); border-radius: 20px; font-size: .8rem; margin: .25rem; }
    .lang-row { display: flex; justify-content: space-between; padding: .5rem 0; font-size: .875rem; border-bottom: 1px solid var(--border); }
    .lang-row:last-child { border-bottom: none; }
    .lang-level { color: var(--muted); font-size: .8rem; }

    /* EDIT PROFILE MODAL */
    .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.75); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .3s; padding: 1rem; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; transform: translateY(20px); transition: transform .3s; }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; }
    .form-group { margin-bottom: 1.1rem; }
    .form-group label { display: block; font-size: .82rem; font-weight: 600; color: var(--muted); margin-bottom: .4rem; text-transform: uppercase; letter-spacing: .04em; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: .65rem 1rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .9rem;
      transition: border-color .2s;
    }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 90px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .toast { position: fixed; bottom: 2rem; right: 2rem; z-index: 300; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.5rem; transform: translateY(100px); opacity: 0; transition: all .3s; max-width: 340px; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error { border-left: 3px solid #f87171; }

    .no-content { color: var(--muted); font-size: .9rem; padding: 1.5rem; text-align: center; background: var(--surface); border-radius: var(--radius); border: 1px dashed var(--border); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Freelance<span>Market</span></a>
  <div style="display:flex;gap:.75rem">
    <a href="explore.html" class="btn btn-ghost btn-sm">Explorar</a>
    <a href="dashboard.html" class="btn btn-primary btn-sm" id="nav-dash" style="display:none">Dashboard</a>
    <a href="login.html" class="btn btn-ghost btn-sm" id="nav-login">Entrar</a>
  </div>
</nav>

<!-- COVER -->
<div class="profile-cover">
  <div class="cover-pattern"></div>
  <div class="profile-avatar-wrap">
    <div class="profile-avatar" id="profile-avatar">?</div>
    <div class="online-dot" id="online-dot" style="display:none"></div>
  </div>
</div>

<div class="container">
  <!-- HEADER -->
  <div class="profile-header">
    <div class="profile-info">
      <div class="profile-name" id="profile-name">Cargando...</div>
      <div class="profile-username" id="profile-username">@—</div>
      <div class="profile-bio" id="profile-bio"></div>
      <div class="profile-meta" id="profile-meta"></div>
    </div>
    <div class="profile-actions" id="profile-actions"></div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-cell"><div class="stat-val" id="stat-orders">0</div><div class="stat-label">Pedidos</div></div>
    <div class="stat-cell"><div class="stat-val" id="stat-services">0</div><div class="stat-label">Servicios</div></div>
    <div class="stat-cell"><div class="stat-val" id="stat-rating">—</div><div class="stat-label">Valoración</div></div>
    <div class="stat-cell"><div class="stat-val" id="stat-member">—</div><div class="stat-label">Miembro desde</div></div>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="profile-layout">
    <!-- LEFT -->
    <div>
      <div class="section">
        <div class="section-title">Servicios activos</div>
        <div class="services-grid" id="services-grid">
          <div style="color:var(--muted);font-size:.9rem">Cargando...</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Reseñas recibidas</div>
        <div id="reviews-container">
          <div style="color:var(--muted);font-size:.9rem">Cargando...</div>
        </div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div>
      <div class="sidebar-card" id="skills-card" style="display:none">
        <div class="sidebar-card-title">Habilidades</div>
        <div id="skills-list"></div>
      </div>

      <div class="sidebar-card" id="langs-card" style="display:none">
        <div class="sidebar-card-title">Idiomas</div>
        <div id="langs-list"></div>
      </div>

      <div class="sidebar-card">
        <div class="sidebar-card-title">Más info</div>
        <div id="extra-info"></div>
      </div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">✏️ Editar perfil</h2>
      <button class="modal-close" onclick="closeEdit()">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Nombre completo</label><input id="edit-fullname" type="text" placeholder="Tu nombre"/></div>
      <div class="form-group"><label>Nombre de usuario</label><input id="edit-username" type="text" placeholder="username"/></div>
    </div>
    <div class="form-group"><label>Bio</label><textarea id="edit-bio" placeholder="Cuéntanos sobre ti..."></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Ubicación</label><input id="edit-location" type="text" placeholder="Madrid, España"/></div>
      <div class="form-group"><label>Sitio web</label><input id="edit-website" type="text" placeholder="https://tu-web.com"/></div>
    </div>
    <div class="form-group"><label>Habilidades (separadas por coma)</label><input id="edit-skills" type="text" placeholder="React, Diseño, SEO..."/></div>
    <div class="form-group"><label>Idiomas (separados por coma)</label><input id="edit-languages" type="text" placeholder="Español, Inglés..."/></div>
    <div class="form-group" style="display:flex;align-items:center;gap:.75rem">
      <input type="checkbox" id="edit-is-seller" style="width:auto;accent-color:var(--accent)"/>
      <label for="edit-is-seller" style="text-transform:none;letter-spacing:0;color:var(--text)">Soy vendedor (activar perfil de freelancer)</label>
    </div>
    <div style="display:flex;gap:.75rem;margin-top:1rem">
      <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="closeEdit()">Cancelar</button>
      <button class="btn btn-primary" style="flex:1;justify-content:center" id="btn-save-profile">Guardar cambios</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-text"></span></div>

<script>
  const SUPABASE_URL = 'https://lsougtrfsbpvadyikyfm.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxzb3VndHJmc2JwdmFkeWlreWZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NzAyMTcsImV4cCI6MjA5MTI0NjIxN30.NeqCGj-b7nK9EBXBhpFN65fY4yYwqnuTpX_jigDV38s';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const CATEGORIES = [
    { id: 'design', label: 'Diseño Gráfico', icon: '🎨' },
    { id: 'dev', label: 'Desarrollo Web', icon: '💻' },
    { id: 'marketing', label: 'Marketing Digital', icon: '📣' },
    { id: 'video', label: 'Video & Animación', icon: '🎬' },
    { id: 'writing', label: 'Redacción & Traducción', icon: '✍️' },
    { id: 'music', label: 'Música & Audio', icon: '🎵' },
    { id: 'business', label: 'Negocios', icon: '💼' },
    { id: 'ai', label: 'Servicios con IA', icon: '🤖' },
  ];

  let currentUser = null;
  let profileData = null;

  function getParam(k) { return new URLSearchParams(location.search).get(k); }
  function initials(n) { if(!n) return '?'; return n.split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2); }
  function stars(n) { const f = Math.round(n||5); return '★'.repeat(f)+'☆'.repeat(5-f); }

  function toast(msg, type='success') {
    const el = document.getElementById('toast');
    document.getElementById('toast-text').textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.className='toast', 3500);
  }

  function closeEdit() { document.getElementById('edit-modal').classList.remove('open'); }

  async function init() {
    const { data: { user } } = await db.auth.getUser();
    currentUser = user;
    if (user) {
      document.getElementById('nav-dash').style.display = 'flex';
      document.getElementById('nav-login').style.display = 'none';
    }

    const profileId = getParam('id') || user?.id;
    if (!profileId) { window.location.href = 'login.html'; return; }

    await loadProfile(profileId);
  }

  async function loadProfile(profileId) {
    const { data, error } = await db.from('profiles').select('*').eq('id', profileId).single();
    if (error || !data) { document.getElementById('profile-name').textContent = 'Usuario no encontrado'; return; }
    profileData = data;

    renderProfile();
    await Promise.all([loadServices(profileId), loadReviews(profileId)]);
  }

  function renderProfile() {
    const p = profileData;
    const name = p.full_name || p.username || 'Usuario';
    document.title = `${name} — FreelanceMarket`;

    const av = document.getElementById('profile-avatar');
    if (p.avatar_url) { av.innerHTML = `<img src="${p.avatar_url}" alt="${name}"/>`; }
    else { av.textContent = initials(name); }

    document.getElementById('profile-name').textContent = name;
    document.getElementById('profile-username').textContent = `@${p.username || 'usuario'}`;
    document.getElementById('profile-bio').textContent = p.bio || '';

    const meta = document.getElementById('profile-meta');
    meta.innerHTML = [
      p.location ? `<span>📍 ${p.location}</span>` : '',
      p.website ? `<span>🌐 <a href="${p.website}" target="_blank" style="color:var(--accent)">${p.website.replace('https://','')}</a></span>` : '',
      p.is_seller ? `<span style="color:var(--success)">✅ Freelancer verificado</span>` : '',
    ].filter(Boolean).join('');

    document.getElementById('stat-member').textContent = new Date(p.created_at).toLocaleDateString('es-ES', { month:'short', year:'numeric' });

    // Actions
    const actions = document.getElementById('profile-actions');
    if (currentUser?.id === p.id) {
      actions.innerHTML = `
        <a href="recu.html" class="btn btn-primary btn-sm">Cambiar Contraseña</a>
        <button class="btn btn-ghost btn-sm" onclick="openEdit()">✏️ Editar perfil</button>
        <a href="my-services.html" class="btn btn-primary btn-sm">Mis servicios</a>
      `;
    } else if (currentUser) {
      actions.innerHTML = `<a href="chat.html?with=${p.id}" class="btn btn-primary btn-sm">💬 Contactar</a>`;
    }

    // Skills
    if (p.skills?.length) {
      document.getElementById('skills-card').style.display = 'block';
      document.getElementById('skills-list').innerHTML = p.skills.map(s => `<span class="skill-chip">${s}</span>`).join('');
    }

    // Languages
    if (p.languages?.length) {
      document.getElementById('langs-card').style.display = 'block';
      document.getElementById('langs-list').innerHTML = p.languages.map(l => `<div class="lang-row"><span>${l}</span></div>`).join('');
    }

    // Extra
    document.getElementById('extra-info').innerHTML = `
      <div class="lang-row"><span style="color:var(--muted)">Miembro</span><span>${new Date(p.created_at).toLocaleDateString('es-ES',{month:'long',year:'numeric'})}</span></div>
      <div class="lang-row"><span style="color:var(--muted)">Modalidad</span><span>${p.is_seller ? 'Vendedor' : 'Comprador'}</span></div>
    `;
  }

  async function loadServices(profileId) {
    const { data } = await db.from('services').select('*').eq('user_id', profileId).eq('status', 'active').order('created_at', { ascending: false });
    const grid = document.getElementById('services-grid');
    document.getElementById('stat-services').textContent = data?.length || 0;
    if (!data?.length) {
      grid.innerHTML = '<div class="no-content">No hay servicios activos todavía</div>';
      return;
    }
    grid.innerHTML = data.map(s => `
      <a href="service.html?id=${s.id}" class="service-card">
        <div class="sc-cover">${s.cover_emoji || '🎨'}</div>
        <div class="sc-body">
          <div class="sc-title">${s.title}</div>
          <div class="sc-footer">
            <span class="sc-rating">★ ${(s.rating||5).toFixed(1)} (${s.reviews_count||0})</span>
            <span class="sc-price">Desde €${parseFloat(s.price_from||0).toFixed(2)}</span>
          </div>
        </div>
      </a>
    `).join('');

    // Aggregate stats
    const totalOrders = data.reduce((a,s) => a+(s.orders_count||0), 0);
    const avgRating = data.length ? (data.reduce((a,s)=>a+(s.rating||5),0)/data.length).toFixed(1) : '—';
    document.getElementById('stat-orders').textContent = totalOrders;
    document.getElementById('stat-rating').textContent = avgRating;
  }

  async function loadReviews(profileId) {
    const { data } = await db
      .from('reviews')
      .select(`*, profiles!reviews_reviewer_id_fkey(username, full_name), services(title)`)
      .eq('service_id.user_id', profileId)  // indirect; fallback below
      .order('created_at', { ascending: false })
      .limit(10);

    // Fallback: get reviews via services
    const { data: services } = await db.from('services').select('id').eq('user_id', profileId);
    const ids = (services||[]).map(s=>s.id);
    const container = document.getElementById('reviews-container');
    if (!ids.length) { container.innerHTML = '<div class="no-content">Sin reseñas todavía</div>'; return; }

    const { data: reviews } = await db
      .from('reviews')
      .select(`*, profiles!reviews_reviewer_id_fkey(username, full_name), services(title)`)
      .in('service_id', ids)
      .order('created_at', { ascending: false })
      .limit(8);

    if (!reviews?.length) { container.innerHTML = '<div class="no-content">Sin reseñas todavía</div>'; return; }

    container.innerHTML = reviews.map(r => {
      const name = r.profiles?.full_name || r.profiles?.username || 'Usuario';
      return `
        <div class="review-card">
          <div class="review-header">
            <div class="review-avatar">${initials(name)}</div>
            <div>
              <div class="review-name">${name}</div>
              <div class="review-date">${new Date(r.created_at).toLocaleDateString('es-ES',{month:'long',year:'numeric',day:'numeric'})}</div>
            </div>
          </div>
          <div class="review-stars">${stars(r.rating)}</div>
          <div class="review-text">${r.comment||''}</div>
          ${r.services?.title ? `<div class="review-service">→ ${r.services.title}</div>` : ''}
        </div>
      `;
    }).join('');
  }

  // EDIT PROFILE
  function openEdit() {
    const p = profileData;
    document.getElementById('edit-fullname').value = p.full_name || '';
    document.getElementById('edit-username').value = p.username || '';
    document.getElementById('edit-bio').value = p.bio || '';
    document.getElementById('edit-location').value = p.location || '';
    document.getElementById('edit-website').value = p.website || '';
    document.getElementById('edit-skills').value = (p.skills||[]).join(', ');
    document.getElementById('edit-languages').value = (p.languages||[]).join(', ');
    document.getElementById('edit-is-seller').checked = !!p.is_seller;
    document.getElementById('edit-modal').classList.add('open');
  }

  document.getElementById('btn-save-profile').onclick = async () => {
    const btn = document.getElementById('btn-save-profile');
    btn.disabled = true; btn.textContent = 'Guardando...';
    const skills = document.getElementById('edit-skills').value.split(',').map(s=>s.trim()).filter(Boolean);
    const languages = document.getElementById('edit-languages').value.split(',').map(l=>l.trim()).filter(Boolean);
    const { error } = await db.from('profiles').update({
      full_name: document.getElementById('edit-fullname').value.trim(),
      username: document.getElementById('edit-username').value.trim(),
      bio: document.getElementById('edit-bio').value.trim(),
      location: document.getElementById('edit-location').value.trim(),
      website: document.getElementById('edit-website').value.trim(),
      skills, languages,
      is_seller: document.getElementById('edit-is-seller').checked,
      updated_at: new Date().toISOString()
    }).eq('id', currentUser.id);

    btn.disabled = false; btn.textContent = 'Guardar cambios';
    if (error) { toast('Error al guardar: '+error.message, 'error'); return; }
    closeEdit();
    toast('Perfil actualizado correctamente');
    await loadProfile(currentUser.id);
  };

  document.getElementById('edit-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeEdit(); });

  init();
</script>
</body>
</html>
