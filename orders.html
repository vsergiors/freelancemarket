<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Pedidos — FreelanceMarket</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c6af7;
      --accent2: #f7c26a;
      --text: #f0eeff;
      --muted: #7a7a9a;
      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #f87171;
      --info: #60a5fa;
      --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 64px;
      background: rgba(10,10,15,0.9); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: .9rem; transition: color .2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .5rem 1.2rem; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: .875rem; font-weight: 500; cursor: pointer; border: none; transition: all .2s; text-decoration: none; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6a58e5; }
    .btn-sm { padding: .35rem .85rem; font-size: .8rem; border-radius: 7px; }
    .btn-success { background: rgba(74,222,128,.15); color: var(--success); border: 1px solid rgba(74,222,128,.3); }
    .btn-success:hover { background: rgba(74,222,128,.25); }
    .btn-danger { background: rgba(248,113,113,.15); color: var(--danger); border: 1px solid rgba(248,113,113,.3); }
    .btn-danger:hover { background: rgba(248,113,113,.25); }
    .btn-warning { background: rgba(251,191,36,.15); color: var(--warning); border: 1px solid rgba(251,191,36,.3); }
    .btn-warning:hover { background: rgba(251,191,36,.25); }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }

    /* PAGE HEADER */
    .page-header { padding: 2.5rem 0 2rem; }
    .page-header h1 { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; margin-bottom: .5rem; }
    .page-header p { color: var(--muted); font-size: .95rem; }

    /* FILTER TABS */
    .filter-row { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .filter-btn {
      padding: .45rem 1rem; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: .85rem; cursor: pointer; transition: all .2s;
    }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .filter-btn:hover:not(.active) { color: var(--text); border-color: var(--accent); }

    /* MODE SWITCH */
    .mode-switch { display: flex; gap: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; margin-bottom: 2rem; width: fit-content; }
    .mode-btn { padding: .4rem 1.2rem; border-radius: 7px; border: none; background: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: .85rem; cursor: pointer; transition: all .2s; }
    .mode-btn.active { background: var(--surface2); color: var(--text); }

    /* TOP ROW */
    .top-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }

    /* ORDERS TABLE */
    .orders-grid { display: flex; flex-direction: column; gap: 1rem; }
    .order-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1.5rem;
      display: grid; grid-template-columns: auto 1fr auto auto;
      gap: 1.25rem; align-items: center;
      transition: border-color .2s;
    }
    .order-card:hover { border-color: var(--accent); }
    @media(max-width: 700px) { .order-card { grid-template-columns: 1fr; } }

    .order-emoji {
      width: 52px; height: 52px; border-radius: 12px;
      background: var(--surface2); display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; flex-shrink: 0;
    }
    .order-info {}
    .order-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: .2rem; }
    .order-title a { color: var(--text); text-decoration: none; }
    .order-title a:hover { color: var(--accent); }
    .order-meta { display: flex; gap: 1rem; flex-wrap: wrap; font-size: .8rem; color: var(--muted); }
    .order-meta span { display: flex; align-items: center; gap: .25rem; }
    .order-amount { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--accent2); white-space: nowrap; }
    .order-actions { display: flex; flex-direction: column; gap: .5rem; align-items: flex-end; }

    /* STATUS BADGE */
    .status-badge {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .25rem .8rem; border-radius: 20px;
      font-size: .75rem; font-weight: 600; letter-spacing: .03em;
    }
    .status-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .status-pending { background: rgba(251,191,36,.12); color: var(--warning); }
    .status-in_progress { background: rgba(96,165,250,.12); color: var(--info); }
    .status-delivered { background: rgba(167,139,250,.12); color: #a78bfa; }
    .status-revision { background: rgba(251,191,36,.12); color: var(--warning); }
    .status-completed { background: rgba(74,222,128,.12); color: var(--success); }
    .status-cancelled { background: rgba(248,113,113,.12); color: var(--danger); }

    /* EMPTY */
    .empty-state { text-align: center; padding: 5rem 1.5rem; }
    .empty-icon { font-size: 4rem; margin-bottom: 1rem; }
    .empty-title { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700; margin-bottom: .5rem; }
    .empty-text { color: var(--muted); margin-bottom: 1.5rem; }

    /* DETAIL MODAL */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.75); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .3s; padding: 1rem;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 2rem; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
      transform: translateY(20px); transition: transform .3s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; line-height: 1; }
    .modal-close:hover { color: var(--text); }
    .detail-row { display: flex; justify-content: space-between; padding: .65rem 0; border-bottom: 1px solid var(--border); font-size: .875rem; }
    .detail-row:last-of-type { border-bottom: none; }
    .detail-label { color: var(--muted); }
    .detail-val { font-weight: 500; text-align: right; }
    .reqs-box { background: var(--surface2); border-radius: 10px; padding: 1rem; margin: 1rem 0; font-size: .875rem; color: #c8c8e0; line-height: 1.6; }
    .modal-actions { display: flex; gap: .75rem; flex-wrap: wrap; margin-top: 1.5rem; }

    /* REVIEW FORM */
    .review-form { background: var(--surface2); border-radius: 12px; padding: 1.25rem; margin-top: 1rem; }
    .review-form h4 { font-family: 'Syne', sans-serif; font-size: .95rem; margin-bottom: 1rem; }
    .star-picker { display: flex; gap: .35rem; margin-bottom: 1rem; }
    .star-btn { font-size: 1.5rem; cursor: pointer; color: var(--border); transition: color .15s; background: none; border: none; }
    .star-btn.active, .star-btn:hover { color: var(--accent2); }
    .review-form textarea {
      width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: .75rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .875rem;
      resize: vertical; min-height: 90px; transition: border-color .2s;
    }
    .review-form textarea:focus { outline: none; border-color: var(--accent); }

    /* TIMELINE */
    .timeline { position: relative; padding-left: 1.5rem; margin: 1.5rem 0; }
    .timeline::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background: var(--border); }
    .tl-item { position: relative; margin-bottom: 1rem; }
    .tl-dot {
      position: absolute; left: -1.5rem; top: 3px;
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--border); background: var(--bg);
    }
    .tl-dot.done { background: var(--accent); border-color: var(--accent); }
    .tl-dot.current { background: var(--accent2); border-color: var(--accent2); }
    .tl-label { font-size: .82rem; font-weight: 600; color: var(--muted); }
    .tl-label.done, .tl-label.current { color: var(--text); }

    /* TOAST */
    .toast { position: fixed; bottom: 2rem; right: 2rem; z-index: 300; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.5rem; transform: translateY(100px); opacity: 0; transition: all .3s; max-width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error { border-left: 3px solid var(--danger); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Freelance<span>Market</span></a>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="orders.html" class="active">Pedidos</a>
    <a href="my-services.html">Mis servicios</a>
  </div>
  <a href="explore.html" class="btn btn-primary btn-sm">Explorar</a>
</nav>

<div class="container">
  <div class="page-header">
    <h1>📦 Mis Pedidos</h1>
    <p>Gestiona todos tus pedidos como comprador y vendedor</p>
  </div>

  <div class="top-row">
    <div class="mode-switch">
      <button class="mode-btn active" data-mode="buying" onclick="switchMode('buying')">Comprando</button>
      <button class="mode-btn" data-mode="selling" onclick="switchMode('selling')">Vendiendo</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" data-status="all" onclick="filterOrders('all')">Todos</button>
      <button class="filter-btn" data-status="pending" onclick="filterOrders('pending')">Pendiente</button>
      <button class="filter-btn" data-status="in_progress" onclick="filterOrders('in_progress')">En progreso</button>
      <button class="filter-btn" data-status="delivered" onclick="filterOrders('delivered')">Entregado</button>
      <button class="filter-btn" data-status="completed" onclick="filterOrders('completed')">Completado</button>
      <button class="filter-btn" data-status="cancelled" onclick="filterOrders('cancelled')">Cancelado</button>
    </div>
  </div>

  <div class="orders-grid" id="orders-grid">
    <div style="text-align:center;padding:3rem;color:var(--muted)">Cargando pedidos...</div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Detalle del pedido</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-text"></span></div>

<script>
  const SUPABASE_URL = 'https://lsougtrfsbpvadyikyfm.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxzb3VndHJmc2JwdmFkeWlreWZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NzAyMTcsImV4cCI6MjA5MTI0NjIxN30.NeqCGj-b7nK9EBXBhpFN65fY4yYwqnuTpX_jigDV38s';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const STATUS_LABELS = {
    pending: 'Pendiente', in_progress: 'En progreso',
    delivered: 'Entregado', revision: 'Revisión',
    completed: 'Completado', cancelled: 'Cancelado'
  };
  const STATUS_ORDER = ['pending','in_progress','delivered','revision','completed','cancelled'];

  let currentUser = null;
  let allOrders = [];
  let currentMode = 'buying';
  let currentFilter = 'all';
  let selectedRating = 0;

  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    document.getElementById('toast-text').textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.className = 'toast', 3500);
  }

  function closeModal() {
    document.getElementById('detail-modal').classList.remove('open');
  }

  async function init() {
    const { data: { user } } = await db.auth.getUser();
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;
    await loadOrders();
  }

  async function loadOrders() {
    const field = currentMode === 'buying' ? 'buyer_id' : 'seller_id';
    const { data, error } = await db
      .from('orders')
      .select(`*, services(title, cover_emoji, category), profiles!orders_buyer_id_fkey(username, full_name), seller:profiles!orders_seller_id_fkey(username, full_name)`)
      .eq(field, currentUser.id)
      .order('created_at', { ascending: false });

    if (error) { toast('Error al cargar pedidos', 'error'); return; }
    allOrders = data || [];
    renderOrders();
  }

  function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    loadOrders();
  }

  function filterOrders(status) {
    currentFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.status === status));
    renderOrders();
  }

  function renderOrders() {
    const grid = document.getElementById('orders-grid');
    const orders = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentFilter);

    if (!orders.length) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-title">No hay pedidos aquí</div>
          <div class="empty-text">Cuando ${currentMode === 'buying' ? 'compres un servicio' : 'alguien te contrate'}, aparecerá aquí.</div>
          ${currentMode === 'buying' ? '<a href="explore.html" class="btn btn-primary">Explorar servicios</a>' : '<a href="my-services.html" class="btn btn-primary">Ver mis servicios</a>'}
        </div>
      `;
      return;
    }

    grid.innerHTML = orders.map(o => {
      const svc = o.services;
      const buyer = o.profiles;
      const seller = o.seller;
      const counterpart = currentMode === 'buying' ? seller : buyer;
      const cname = counterpart?.full_name || counterpart?.username || 'Usuario';

      return `
        <div class="order-card" onclick="openDetail('${o.id}')">
          <div class="order-emoji">${svc?.cover_emoji || '📦'}</div>
          <div class="order-info">
            <div class="order-title"><a href="service.html?id=${o.service_id}">${svc?.title || 'Servicio eliminado'}</a></div>
            <div class="order-meta">
              <span>👤 ${currentMode === 'buying' ? 'Vendedor' : 'Comprador'}: ${cname}</span>
              <span>📦 ${o.package_name || 'Paquete'}</span>
              <span>📅 ${new Date(o.created_at).toLocaleDateString('es-ES')}</span>
              ${o.delivery_days ? `<span>⏱ ${o.delivery_days} días</span>` : ''}
            </div>
          </div>
          <div class="order-amount">€${parseFloat(o.amount).toFixed(2)}</div>
          <div class="order-actions">
            <span class="status-badge status-${o.status}">${STATUS_LABELS[o.status] || o.status}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  async function openDetail(orderId) {
    const order = allOrders.find(o => o.id === orderId);
    if (!order) return;

    const svc = order.services;
    const isBuyer = order.buyer_id === currentUser.id;
    const isSeller = order.seller_id === currentUser.id;
    const statusSteps = ['pending','in_progress','delivered','completed'];
    const curStep = statusSteps.indexOf(order.status);

    // Check existing review
    const { data: existingReview } = await db.from('reviews').select('id').eq('order_id', orderId).single();

    let actionsHTML = '';
    if (isSeller) {
      if (order.status === 'pending') {
        actionsHTML += `<button class="btn btn-primary btn-sm" onclick="updateStatus('${orderId}','in_progress')">▶ Aceptar y empezar</button>`;
        actionsHTML += `<button class="btn btn-danger btn-sm" onclick="updateStatus('${orderId}','cancelled')">✕ Rechazar</button>`;
      }
      if (order.status === 'in_progress') {
        actionsHTML += `<button class="btn btn-success btn-sm" onclick="updateStatus('${orderId}','delivered')">📤 Marcar como entregado</button>`;
      }
      if (order.status === 'revision') {
        actionsHTML += `<button class="btn btn-success btn-sm" onclick="updateStatus('${orderId}','delivered')">📤 Volver a entregar</button>`;
      }
    }
    if (isBuyer) {
      if (order.status === 'delivered') {
        actionsHTML += `<button class="btn btn-success btn-sm" onclick="updateStatus('${orderId}','completed')">✅ Aceptar entrega</button>`;
        actionsHTML += `<button class="btn btn-warning btn-sm" onclick="updateStatus('${orderId}','revision')">🔄 Pedir revisión</button>`;
      }
      if (order.status === 'pending') {
        actionsHTML += `<button class="btn btn-danger btn-sm" onclick="updateStatus('${orderId}','cancelled')">✕ Cancelar pedido</button>`;
      }
    }
    actionsHTML += `<a href="chat.html?with=${isBuyer ? order.seller_id : order.buyer_id}" class="btn btn-ghost btn-sm">💬 Mensaje</a>`;

    let reviewHTML = '';
    if (isBuyer && order.status === 'completed' && !existingReview) {
      reviewHTML = `
        <div class="review-form" id="review-form">
          <h4>⭐ Dejar reseña</h4>
          <div class="star-picker" id="star-picker">
            ${[1,2,3,4,5].map(n => `<button class="star-btn" data-val="${n}" onclick="setRating(${n})">★</button>`).join('')}
          </div>
          <textarea id="review-comment" placeholder="Cuéntanos cómo fue tu experiencia..."></textarea>
          <button class="btn btn-primary btn-sm" style="margin-top:.75rem;width:100%;justify-content:center" onclick="submitReview('${orderId}','${order.service_id}')">Publicar reseña</button>
        </div>
      `;
    }

    document.getElementById('modal-title').textContent = svc?.title || 'Detalle del pedido';
    document.getElementById('modal-body').innerHTML = `
      <div style="margin-bottom:1rem">
        <span class="status-badge status-${order.status}">${STATUS_LABELS[order.status]}</span>
      </div>

      <div class="timeline">
        ${statusSteps.map((s, i) => `
          <div class="tl-item">
            <div class="tl-dot ${i < curStep ? 'done' : i === curStep ? 'current' : ''}"></div>
            <div class="tl-label ${i <= curStep ? (i === curStep ? 'current' : 'done') : ''}">${STATUS_LABELS[s]}</div>
          </div>
        `).join('')}
      </div>

      <div class="detail-row"><span class="detail-label">Paquete</span><span class="detail-val">${order.package_name || '—'}</span></div>
      <div class="detail-row"><span class="detail-label">Importe</span><span class="detail-val" style="color:var(--accent2);font-weight:700">€${parseFloat(order.amount).toFixed(2)}</span></div>
      <div class="detail-row"><span class="detail-label">Días de entrega</span><span class="detail-val">${order.delivery_days || '—'}</span></div>
      <div class="detail-row"><span class="detail-label">Creado</span><span class="detail-val">${new Date(order.created_at).toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'})}</span></div>
      ${order.delivered_at ? `<div class="detail-row"><span class="detail-label">Entregado</span><span class="detail-val">${new Date(order.delivered_at).toLocaleDateString('es-ES')}</span></div>` : ''}
      ${order.completed_at ? `<div class="detail-row"><span class="detail-label">Completado</span><span class="detail-val">${new Date(order.completed_at).toLocaleDateString('es-ES')}</span></div>` : ''}

      ${order.requirements ? `<div style="margin-top:1rem"><div style="font-size:.8rem;color:var(--muted);margin-bottom:.4rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Requisitos del comprador</div><div class="reqs-box">${order.requirements}</div></div>` : ''}

      <div class="modal-actions">${actionsHTML}</div>
      ${reviewHTML}
    `;

    document.getElementById('detail-modal').classList.add('open');
  }

  async function updateStatus(orderId, status) {
    const update = { status, updated_at: new Date().toISOString() };
    if (status === 'delivered') update.delivered_at = new Date().toISOString();
    if (status === 'completed') update.completed_at = new Date().toISOString();

    const { error } = await db.from('orders').update(update).eq('id', orderId);
    if (error) { toast('Error al actualizar: ' + error.message, 'error'); return; }

    const idx = allOrders.findIndex(o => o.id === orderId);
    if (idx !== -1) Object.assign(allOrders[idx], update);

    closeModal();
    renderOrders();
    toast(`Estado actualizado: ${STATUS_LABELS[status]}`);
  }

  function setRating(val) {
    selectedRating = val;
    document.querySelectorAll('.star-btn').forEach((b, i) => b.classList.toggle('active', i < val));
  }

  async function submitReview(orderId, serviceId) {
    if (!selectedRating) { toast('Selecciona una valoración', 'error'); return; }
    const comment = document.getElementById('review-comment').value.trim();
    const { error } = await db.from('reviews').insert({
      order_id: orderId,
      service_id: serviceId,
      reviewer_id: currentUser.id,
      rating: selectedRating,
      comment
    });
    if (error) { toast('Error al publicar reseña: ' + error.message, 'error'); return; }
    closeModal();
    toast('¡Reseña publicada! Gracias 🌟');
  }

  document.getElementById('detail-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  init();
</script>
</body>
</html>
